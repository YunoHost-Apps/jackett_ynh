#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1731~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1731/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "581238109102916c297ca81f50094b62da83d3f6c0a68ca2cf201e292781f057"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1731/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "9c9b8974d7d432944fd8049c3beee374e13ca4710d7d7b5981c07c73a9461f79"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1731/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d886d1001dc80fc6cfb20caa3eaefeffd29d5fb7533510422db6fed3751204be"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
