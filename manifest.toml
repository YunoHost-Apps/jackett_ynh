#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1465~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1465/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "212842a27ca009a120d36fffd6c919eb00af0eb3f466130540c5ff188ecc0176"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1465/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "05b2bd70571504d927c0e20a21dddea4944549956467061441aada153573d6cc"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1465/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a32113ce6f169969e8a5139acb74fb3c5b2e2c1ac8607154db17508b8c2eccbb"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
