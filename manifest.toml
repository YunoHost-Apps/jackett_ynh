#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1464~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1464/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "5b2cf0c5ac19b75b045a92a0c0a3b4563c9166cb28f739567a2ab5d65889017a"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1464/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "4ea27c224ae4801c3fa8e517177690e312f215c477e5ca09c425c4d8f35be254"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1464/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "2fe01afddcf1d3d9cf0f9439a6bb13e7cb6f1245e92c03615687d265bb1daa93"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
