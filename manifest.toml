#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1827~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1827/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "4429dc3f141a2438d9d38711ba7ca2e9b0cab783660167217bc77b4989400d16"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1827/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "eb9f42298a13b0154faac4fbd7c9b8bc845a85ecf0d9cd10622a1fac5e00d888"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1827/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "1e3e6d367f2fc2c7440536fbe5f93ccfbcc42b1fb40b935f6c77eb33d4766365"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
