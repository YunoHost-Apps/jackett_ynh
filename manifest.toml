#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1528~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1528/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "e8965ea3135ba2d5cb57b90ca56409db421bbe54be44bde835bb78a54b4b0cfa"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1528/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a22bb075ec6d7aa1f262738fb29ad23c573de0365084f1b53574ca6f33b41cec"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1528/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "c00ef9afb457b3bbfcdbb08d913e7ffb70245db231394adf68fa753df6872b16"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
