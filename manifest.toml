#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1567~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1567/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "ad6a3f2ec05a186f90ef1ef5c8f91eea77b33b0456e8b5803e7fb1dcd21b9ff4"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1567/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "abb733204eb317c7ae0b985bb02b3b089cae2ba88faea3c33d406864cce9e44e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1567/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d2d1b37ddd02af0d2affaca270d4f47138215ce46cfac9310d1e61e92b0f0eb3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
