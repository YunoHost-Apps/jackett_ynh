#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1649~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1649/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "4e44ad26e2eac4ea1d4a9ed266b1ec4ffa64051b9b3d3a604c48aee3782897cb"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1649/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "7cd96412e3bc3af6378efcc88feb2e5e72cc248f05bc7473bc77140b1a0175df"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1649/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "62edb62b13998b1076b78baaa0b4f3697dbdd19dc3b8f343a79e82b029331359"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
