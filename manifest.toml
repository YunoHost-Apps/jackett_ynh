#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1996~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1996/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "3d202b7714003120d5987177b624e7e64ef9b495d8d8cd641ce29b29eea239f0"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1996/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "023250621b4d631dea809b897d1abf65558223aed34d74698520b8136d867045"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1996/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "06efc3fc1cd977b5533083d37482c97dd19414e7b5b83e0391ee082f73c4906e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
