#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1867~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1867/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "a42a3fe2e82ceb9d84675c467fd4aa829d2a0b88f6258f26f3bfa01033530fec"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1867/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "1e2759172c744af37c2ad35d99ee276486b4d51255b32937260be7f558a4118c"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1867/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a2a138956568f2897b8f46a379ee1298ba7d0d61d8a8cd5761bed00017352976"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
