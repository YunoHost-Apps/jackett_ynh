#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1957~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1957/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "918f992ca7571bf10ec1a38a862cb4492c0a983681cd9cd96fc6d0bb25d1167f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1957/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "b2d4f280db10b40c1ef0ba028101707a8a44025043af902962db921b1a4d0c0a"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1957/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "6ead0289aea55cd3d89e09eecbae61e401f7a05cfed433e86831a26cf6200203"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
