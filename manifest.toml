#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1614~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1614/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "e45ead6836d7999f170bc65fa1d9559526625d5a72e4f5b353a227a824e01510"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1614/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "7a47a19d89d6b245b7176dbefdb375e22fcd224618be2a76b315794e81b4fb9e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1614/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "245edb48dc399c89a415e9144a03c7a37439b0a2a42dd00c91e45400ee14d342"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
