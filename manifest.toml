#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1641~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1641/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "20fcce9fa0819656bfd0544902b69394f3ee819b7696237ad9fdbfed19b83f01"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1641/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "acfa3047d45276d8c91a0225430254be7c6bbb88f5d1b97c4fd131fd4bb4da1e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1641/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "04694de12641ddfff6136bfa9dd1dbfe956c4c7cc93ba4152a659491fa96e9fa"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
