#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2125~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2125/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "5381548ac5a6b30f60eb32e5af322387155ce06102b7cade101e621f20594b84"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2125/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a2bab75749ed2878bc33381dc882e4bb14248ed02b1ad00e24cbc2ba7ee71650"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2125/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "6f2f3ac275cde75a44925d0ab7b3609d68722636afa4a8777849aba643cb4302"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
