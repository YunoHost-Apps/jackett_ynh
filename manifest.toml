#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2027~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2027/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "84647fe2fc6ac05fa946af35bad4f94db4c97e5534b732bfd9c87037196c905f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2027/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "2e9e7691f860f2c145a37a189b0af4f9033d3c854560bdf97ba8ddcc9f3c3dc3"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2027/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "391adc9e996f6e89d5cbfdacbf3157917efc2834b63e82045a349ad264d6a7d2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
