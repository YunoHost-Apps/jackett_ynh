#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1879~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1879/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "74bf592123056deccb5440063582ada9933acef2beaa0f7107852adcf6d98249"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1879/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "004b56b85707e6c8e0b23881e8387ff7909ae442bc5a955dc5bb9d80a1cb6fd7"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1879/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b3a3e550bf77d5d34e4efcae352b7f33fb01bb69e940af42f5b5b12508890934"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
