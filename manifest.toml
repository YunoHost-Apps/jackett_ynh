#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1341~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1341/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "9620b5283a57caa80f693858a61c7005709906c59459d455edbabf1ab692ba07"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1341/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "74e4766387f22cc114e2b22884f035247a703af8e80f0d3809d7abf4818837b4"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1341/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "4d17c62295758e4f7b666e2e3b6dff89aecd28be03e0355527a61316bc03b7a2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
