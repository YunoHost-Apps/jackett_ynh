#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2142~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2142/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "e8736a8d064d5bc512b49bea7a29ea6101717054f4f601c4ee3990554c9c80fa"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2142/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ae27e588c907af0fc5a19aae26dda7d2177f9896d5eeb9eb9f08d5c15350a1e1"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2142/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "7ba80b61d19f6011d0adf22e2ec6d258e6de181311b3df308a70287153cdac23"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
