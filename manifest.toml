#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1831~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1831/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "77d9bee7bf6826d293d7717cee14930cd9e4c8fb0565b10d600d25742e1bc4e3"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1831/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "9775dfa0c04fd0914bd8ef6c67369e704cd5cc680b046edd92314c0b47afd4b7"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1831/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a72cf74aa1b583c0b83e3595e1a1813decd0f59bcf6a623a92adb3ada86f0748"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
