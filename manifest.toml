#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2122~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2122/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "1f48dfb44ae88d9f671a68470621af4ab3009c56d40c32140ff04ae348641c30"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2122/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ecd7e33121494e1fee96bc36fa86862f6f1aab1a89c4e61cc4102dca328abff3"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2122/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "042251bef6aa96d7eac795ff70f9034846beac6dd8aef60752352b11190f29f2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
