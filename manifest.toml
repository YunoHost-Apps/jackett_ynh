#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1736~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1736/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "7e3058390c6eb565e5a6fa43f666481f2fffa728984a434c0ae595dcfc9f464e"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1736/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ed1af87925794047ec56544a76e5f8e55565bd728d4fb7907ccf177fd4f493ae"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1736/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ce64efb895aa06642af3ce0275fb9b96e3edd241ee80407101696a8d631aea22"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
