#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1247~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1247/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "b3b3314a5c12b570a4280f54c7cb46c7dea43303b6ba5c0a669315180c128ada"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1247/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "02ea5c9e7f989b05774daaf854cc3193d82a2aff9995a03ace1bdf0e6048279e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1247/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "8da0742adff3d747c7076b3fb234361801fe5faab41df91d5ea8a79bbef8b55e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
