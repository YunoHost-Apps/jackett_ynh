#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1577~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1577/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "60b1e3c1529e13f475fe783672df33485b8ba75ff106ac87fb65cb9ad825bc57"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1577/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "fa7b01f16c5076afbe5bf8eb919f9fa089e30cb4d3d9eb3592579a24c89bf82c"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1577/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d734be8dc47008cd2cd0ac086fffa38eed4856acbb94ddc08ddaf9b879ae4fe7"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
