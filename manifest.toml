#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1412~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1412/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "801716ff8902e23ad19cc67c2022b69241382cfba196eaee2973835a42ed45d3"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1412/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "de2251680a0d93bee4027f8cc585052ca9dcc0bc87769509e9d0d27d073a3333"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1412/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "145c908ee80f1b22ce76b279987cbecb67d3e344377b5dbdd8e9d6fd252ded35"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
