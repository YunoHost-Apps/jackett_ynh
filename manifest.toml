#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2000~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2000/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "895423eda06cc5e8220e1e1d1a11049e6e0844c51ed9b2faba0eadddb0873e6d"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2000/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "3eebc5352a8339f1c5099f8fca9d8abfeb11cfd5814db8e52f9d6dfe1a2b5b36"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2000/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "350f1794f94ddc684df3e261ec963114fe52bc5d94c2f3bafcfc6f99f3cf86d7"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
