#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2116~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2116/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "15c8a50baffb0d8c7b01525751a377d3d89d01476995195d1956c3952c03e64b"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2116/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "85925010f82bd95d9c80504ece338bf2893b55d9f68076d2b1101f438606fb3b"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2116/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "98f3c20938f1a44739f13e3897e8b6b341c519d3f737c22731c9b841601c8ed3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
