#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1970~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1970/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "70f4c62f7824606e0a6be19f5956db6aa7f4267819f23149189c641753a792c0"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1970/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "702b8f96a455160c8a121ca5ad5370839c8c4c16a42296ddb691fa46a8fe8042"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1970/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "7012e7d0254a34ba8abb3eba2ac8b2418a881057126a2c9b096d71df8ea64de5"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
