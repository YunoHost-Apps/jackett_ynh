#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1968~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1968/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "596c24155701a5df2098ea32c92d37745fbb5d55c326130161d03ddbf83ede60"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1968/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "fac64aa306e78eae20cc4eff8750f3248248e11a99d962ed622bc94efcaefb7d"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1968/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "f1299d20e172e48d17944b8a56d443c317594429b8437c781a856e2c779104a3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
