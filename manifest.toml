#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1795~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1795/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "a1f835bb43e4510123e44c9eb261d5c71275a9e891230808118f25a3a41c2b99"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1795/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a854f9a1763cdb514a5197a08fd534a185ceff2b779c2726f70b83d585232226"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1795/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "dc5a4aae2f83b3cf5202bd7a999c5a690b222c7cd2873d558d362be2d5a214a0"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
