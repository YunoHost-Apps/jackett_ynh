#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2135~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2135/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "96ff97acb61f0946a37ada46f8049ab891617fff654181d2987b3601ee3c0b9f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2135/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "99c5ceb1f63eb365f7ffcb91270f9f9fd187a5e22e05c4730a9be6f07d610713"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2135/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "8e2bbd50923dd387480443a970abf40f3197af8b7408721698f244b947009bf1"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
