#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1616~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1616/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "de53ac5d3877b80d2d8c895835dcde98e2b2bf17bae58c3885d898fe710e61ce"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1616/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "d77709a24a9fc26fdf7b7f5f4241fade93da9c39abcef493c86329cdd8247b36"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1616/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d0b1ed472550b90167fe2cde92b55cfed08f838b848aa2b07516c6e250073a8a"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
