#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1909~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1909/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "7138c821f973c6f54855094b868c339171e46111dea27f89b24220d2d5d5aded"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1909/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "d026cdf23ca969eda5819a5501dad0d607aad1cf2e149f5f71965fef31da6c31"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1909/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "540457612c227e8ed246df83d2c908dbcdc20b0c5f4c89dacdc629f171a70af6"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
