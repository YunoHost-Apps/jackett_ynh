#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1846~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1846/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "fd870c5cd1ef87677b41c991b5938c70d1f50d1e03c4bf05a14e5eb9d018442d"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1846/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "efa0b19007345cf2c736647bcbff22fe92754005b484c27dd2ad6b0e7005a020"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1846/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "cb15eac5d0109254c4d35e525d56bf9dad4c52b6aa47f6945538c40e662c35fa"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
