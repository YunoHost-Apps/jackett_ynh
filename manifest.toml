#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1278~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1278/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "5052dcf3aedf82e18050fa19927139d8a56c58c47206051407ecf26e449462f3"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1278/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "d44691b9dd9b32fb980575b7aba7efe1958b820bd366c512dcfc1cc902cdacae"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1278/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "3af4c68cc8634d9002f42c4b04ebb23b785ccee9612ac3debaefcbd628b9047f"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
