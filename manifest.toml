#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1632~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1632/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "c8c8e3c5696b8feec9da2ac31d1ae935c908d662450acd96afd829a6949ff0c6"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1632/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a0c8525a049354069d562d58e60e013546f4efcf86dbdfa6362edc07f6bf3a99"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1632/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "38d86ecd07422d5b3cfe2b6d0dfac529e75588aa8254a059c4fda0d4df76c8e9"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
