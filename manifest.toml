#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1542~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1542/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "304e3215dece34f8143ce73278d45b3bb91a2fc66f658ea37b83e99934f1a847"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1542/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "fbdbad0cc63d9fa0304df9ea3e62dedef9d9d484c2dbe9a039f8c9db3e87a5ce"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1542/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d607c5ea6780018bcac0e8ef754db4cd267bf71e039029823f45b83d50f677fa"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
