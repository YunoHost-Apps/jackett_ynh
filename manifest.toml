#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1552~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1552/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "c2bca7a6e54e33c4c5cf0f947758d4ac4ae9db1844ca655d7c024e6a78b6d8b9"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1552/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a15c9b5401ce9860a6144079f13bc229296119d9c7a6e789907a58a72e9b8cdf"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1552/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b15d391c974db4fa0fb166204dfa2de9913a2d015004e09bb56708260d133efc"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
