#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2126~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2126/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "ae2ba54c8d5f310fccf34ee2d705f7d5d1392ea53defc24000ec3bcf77bbbf95"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2126/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "f4898b1545f50811943b702729532b2d919db37ea5a387ef4e2194861496467d"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2126/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "5d3c04d338c80595a7972adbeb545ec879cd229a13a127a5edeced6a7137dfdd"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
