#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2043~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2043/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "c30fd8af2c5c15fed25538a662ab2ed980c5b67df9ef00d6bb6f03c6e46d839a"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2043/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "47c5af8beacb0927d05068d5246290f1ffbe91ed5f0a5721e2775f9c0b33c861"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2043/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "024aa991676cf3c5e26f694eb33583ce1fa811751b1b0dde8ee132253f3f8451"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
