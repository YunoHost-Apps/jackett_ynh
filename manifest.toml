#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1392~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1392/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "272a0b7bbafc5cafc5f92f4f13bba99cdec806d50e8be1a7bebb3d239891e530"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1392/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "82f2048a378c712d910bc50d708735c1415335a01edecfbd6ea137e155241289"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1392/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "f0f36c9a5440dc24ec8a5ccbe5d93fedab28d475e8e6099e4c9b0727a5245770"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
