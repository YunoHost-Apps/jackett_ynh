#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1485~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1485/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "e63ba496de9ad51ac00bbfab4e9eb2d037e589419b3e1329b1b4e26076afa70f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1485/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "13eab79ef1f012f2d0582e27a95db6c809311b1424181d441012cf20e821ccd8"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1485/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "9aee25078de167f0bb6e1ddc276c190eccad95071846f7de576f24bedd9b68a1"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
