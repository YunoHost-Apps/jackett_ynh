#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1779~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1779/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "23c3d5872f956eb5a21b5a7bc5abdd29ca5b5559c758fa5e68237b51226a010c"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1779/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "68dcb53da45f4d5f25e6b41b7c6eaf2c97c31008624a22a2d4f5e504932faf0f"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1779/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "0fc0852f7e6c8e1e2b09d86f81ab7909ecf6e0cb0c67b4ba5c14e2ea78479ab2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
