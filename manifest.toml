#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2098~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2098/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "31c3b371d5b2e4345b152c00832df7e641d1659a261af4ad9e52aa4588a63bcf"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2098/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "5249c1adbceeaf644101125f6a5b77c5e04bda2628a23306f36c029e5fc9457b"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2098/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b6985575891cbc81571fe2d5980b07d86d34af28cbf4205eb785946e42de50ac"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
