#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2045~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2045/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "c14c7d5a22fc968c054714af089cd2a90c32ab74f349b55b33803f3172f4a450"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2045/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "140a25184f899c4b9d784b289be9c7f0fe1e0793174b9fd2234e249450f1069a"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2045/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "865bf49cd24192da0d7dd7608891fd18a475e91e48c563f35ab6c638fa3c29ce"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
