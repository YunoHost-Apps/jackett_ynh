#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1806~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1806/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "9b0d7b5de57ad915889803cb8ad158e830255f405ffbe3de1f3ab087ab0c6bfd"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1806/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "d9cff574fd6dd0d973437916f46a288b6ec8925a38dfc8242d766f060fda9566"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1806/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "834bc412bb060f31b664c60131d689119293674ae4cca5105598c361a75371bb"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
