#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1974~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1974/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "9fb4c275006c934318eff759fb57dd794e33738ced11f8610fa6501650443cc3"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1974/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "278b0f0f940e61af4f54c4dcfa9ddfbaa01690459c7093cfcd1055e56948cbba"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1974/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "1a29dd275cfdf963739b2619aead4bce7b136200944eb7d5cec658fd1b579ace"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
