#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1601~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1601/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "9f22eeeff3e81ace6a2a723d0b86c367e30ad3954bbafcdfd0af4c6abf7a4b52"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1601/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "e25cb4d2bf6eea177ccda9be3113c9b103638f6cb632daa5e63b62fcaa4d1bb2"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1601/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "2ded35999a6f3a9f1d0c10a2a78a16661824ee458c3c72e0fc5b1539396357b4"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
