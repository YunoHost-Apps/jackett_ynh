#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1916~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1916/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "e66fbcf4cf4cd5fa650cafd2bc00c46a583be8332915ca3ce69f0d3dc38a5738"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1916/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "2dcd3c87c37150c8900c6e28748092061d7d83d36e7890c7ce4520ad42d2c19a"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1916/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "0f252ef13250308651c6301e6507ea908fed98239e2878340ac7b1714b42b080"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
