#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1394~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1394/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "0fb750a45bc08094b883571bd8914e859fa45db6c98012596bf2acfff800273f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1394/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "fec99d0cdb91f5f589904245ccb718ebdf17417fb629125aebe349e74ef984de"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1394/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "27872d5552fb382039ea0ba68a507cad17843e18f458846c2c799cf0d8a1ced8"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
