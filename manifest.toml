#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1368~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1368/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "6d1b961c5ec76b5e35ce9acfe2e903f90e389f3cc0e3ff79bdf7f7b6886be4c5"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1368/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "636f8a3f5994840056362dfc12c13f7422d2fbcf0f39a07ea49d77cb8ee1640b"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1368/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "bd244e0896d187b8960e4cf7b56a41b3bef9772461a607708a30a2a5067bafd8"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
