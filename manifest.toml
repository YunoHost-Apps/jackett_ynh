#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2140~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2140/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "cbd2154feaf1c75b4a2f9e76b22f30fbb89f77afa93a10d089ffd89a0fd27c38"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2140/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "6ab4e3e5d2cb620db6087dd85a126ec48975bed62c0c13c440b999897890e120"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2140/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "23724d7014d64ef3a5c68431e44e636c80785cf811c10d24fe01f3544d77156f"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
