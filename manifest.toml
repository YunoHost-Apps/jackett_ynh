#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2066~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2066/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "8b2f4358c27d712e6f6ab85b04d6c0cbfadd85a9e0c1ecf341439e8db3f89304"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2066/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "9e010c0b6ae3963765b4bf4c752f7099aaf3a1523761bb8cefa8d3b7b26988cf"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2066/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ea7b8a3053bea49883443d0f2a14a1f51f79b92b0d962d86c2be3a3e72c92ab5"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
