#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2033~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2033/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "519df62134ab427f9a2d0157eb4bee71b736374c26f60aa0bf42634b26f8a98f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2033/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "732442fcfa73de5374b825649f072979bce756706cb8fa807fc377f5b28dad9a"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2033/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "4b31a38c8d9b9e54eb7e1680808d338aaf03a86f6c3101236196ffb262ffced3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
