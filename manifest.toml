#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1813~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1813/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "eb40915b865604884b0a0e1066ad709d29b4c52eabf2c01a4039a6fd8afb96c0"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1813/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "690df2b3c0994a5f8de8b4bfe1febe6fe2f1e6aeea41881b095fceccb0d36701"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1813/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "3fbc90b6ea52561221a81fb29d59facc8d93eea699fb00536a32e25d64650a46"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
