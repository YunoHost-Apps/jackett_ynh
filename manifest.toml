#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1375~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1375/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "2acec4e13133ebaae6ffd3b3140b1ca88ee55a242d07412fbab66b9c55392143"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1375/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "713c5abd0c70ca86c160426c4f5e8b69985721e44a3832e43bf87a15a0ffb745"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1375/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b91b07f4539dc1fa53d864fe3e8f32249af84636e51e76cecdcea59d09db59ba"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
