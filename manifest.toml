#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1841~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1841/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "f5b503bab9492a0b922d63cba8ae17ada05503150f52ad5376a0e46891b9b26a"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1841/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "57c70ba0c1ee9f969ae5d23feb5ee32265275d5d8ed3b76e1031619d697f4ada"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1841/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "8c3aa63cef4cb56a49a22ef913695fc9c357bce89dcd8b63139abcd6106f084b"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
