#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1764~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1764/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "48b8f82f0cfb38e0acd884797f4d5bab715507d194215cf866f42667436349c8"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1764/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "f8dd5ece605fd32c9af4bb85a31f7d06086bc6b95f99d4b3d4b311ddde4da056"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1764/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b7e8c48562a5c8ec17f0d7b9afb06fbe956fdfc4a1fd2c3cdde3eef9564a65b8"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
