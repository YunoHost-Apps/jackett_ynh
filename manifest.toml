#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1350~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1350/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "cfd8b883508116ab95408f84b40da4908610f2139f076844a57116b9538b14f8"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1350/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "3be3fd6d5cf52b924fd9e74740cdc9fdf82e12a2cc2b6e04db4389c91fb5122e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1350/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "99c95c2a6330518c3b3e2179b2ea03ffd87227c816146785ab99bc3e5fffbb68"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
