#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2158~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2158/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "cb59ecac780bfe28dd17767d81cf7f3f9ddef36c6dc163be76b8184cf86e2f08"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2158/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "80a40cf9239b825e189a16fa69c2cad6fd2032decc08760d0e21302c0fd08f44"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2158/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "aeadd7ac013f40ed4031c7cb0bd5e2201380d72fb4affdc7d5f41f4f51dc96ba"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
