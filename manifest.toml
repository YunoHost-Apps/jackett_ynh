#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1427~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1427/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "ae65ad0e42a1c28f5870d1fd997be5630305b9d5258d714105a60429b13b9724"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1427/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "87f08f80125ade26230a6c8fc363370e2f1a9ce4b1e6d90247c7a651dfb17e68"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1427/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "0a753376cb7e8f4746114abdfe482055c168cd791e252efaa27c877e040f8412"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
