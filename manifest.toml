#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1474~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1474/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "fa93d84fbff9810d9a02fd6a913b83524779f6b7082d04a51afc3c6957780cf7"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1474/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "46162e6b3d6d880c845b05d081f2a5608648c5d4b46524cc4a6716a90efdd62b"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1474/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "280e70ab787f7de5fad33377475799f7a5db484612e3a97e97ae0dd59d6618e8"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
