#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2057~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2057/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "a9646d66f0fc7b42e3838d64b095984c602861ad4417af4bb66c58f3bb33fb50"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2057/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "aed5f824f78738e7ac84dce8e8e5f204fa0f74646fc366654d840913a69a5c30"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2057/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a1d7e8f56e63a8ea4c3dc9490bf716b9c42f75f545b009f285ff1266ce3d0dec"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
