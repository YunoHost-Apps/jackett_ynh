#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1870~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1870/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "f27d3a4f727294e0d5a4b1a6d77a938292e605d0c80c20880891341995c62cbd"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1870/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "2c94ffc4d2f475a42ec0911d87d2666764ddab90f6e415eaeb25838357a72fc1"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1870/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d8eca5e501b22cb0b1b3de39706089c93e6de91e2b290a18d0138ee8408f8385"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
