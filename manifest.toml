#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1787~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1787/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "48f97e194e3f97fa6beb0f10bb64c3bba3faaae38c49674d54116fffa33744b7"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1787/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "18ab77aee61ba9c8887e5792b5c2268347b992fe660ed129cc9e109a5a1364ad"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1787/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "531f162e99a6533ef53610e1edf62aee9a3097b98ca079e5eea66c8c9423ca57"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
