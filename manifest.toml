#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1562~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1562/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "3f7aeee04e348a21e5f54494ed1445f1c910a69a06ac35a727b80bbf7b7170af"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1562/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "abc5d41910b623f49dab5cd2bbabeee536024d7b333b630244848bac5e750ecc"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1562/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "98e924f5e1e80dd5dc82980f7513d49d7e061cbdad4fcc92fb3c92393013ac93"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
