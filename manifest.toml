#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1622~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1622/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "190de466f2fa0048d78a540c00812d4f0e281869cf54cc080b6995edc7f0f56a"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1622/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "d6ebe8ee529ace2a43d720064b8f89b00b9636c1d6a6de53dc6f6a592602256e"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1622/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b5ebf40025a35b8bab47aeb9e2e69ff422ffff466d433f5a901a631f1a29395c"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
