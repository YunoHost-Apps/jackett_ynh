#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2108~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2108/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "8a274b49fe312c0569a388a9fd6b704df348efa83a88ebb034442be8c8d08612"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2108/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "8cfff7b1ff4dabb3c40f7221104a7de3876f3801fb1559d1e0f9429131fa07e9"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2108/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ae8c39dd57658418f38475214e48eb8b3bae52a1a1569423c2e150de77704bac"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
