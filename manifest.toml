#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1591~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1591/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "34a702a80b7459aa4ccd30425fe1924b26376835fe6ecd0c003a58616f6ee185"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1591/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "2480aac1d829e2993443c436a9c9c322727d7f1b500d5a548dad9f0294585257"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1591/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "854c9caa3260e701bf3317e57f7a7c39e4505be322b7da51f566d77f5822c05b"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
