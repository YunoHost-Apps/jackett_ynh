#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1440~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1440/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "3cbfa3ae77c33c4abc5b5101ad8bb5bf03ca9b4160ae95c4322cce5f58c26738"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1440/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ce80f798e6357c92e56c91732d5dcdd1647c9c96de3bcbacdcf526867c98e592"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1440/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ecb9a88ddd11c3f316fa3dc2fb54dadc71ac6e7e669a48a3a4980ed3e470bb7d"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
