#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1914~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1914/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "c85cc5d8bdaefba1c7cc6694e411d59abc0235e7c6a4b31e69ff5a99ce7a1a94"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1914/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "813308e4e683bd3bd5d92101daf326bf193d9259ba2d1e6cdc866aafeb2447bf"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1914/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "6f4cf81716e4ff1f91379a9d7321cdfbc9b26a34fc4212a20e763aaeee616ccf"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
