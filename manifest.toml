#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1564~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1564/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "cc3ea09e1873a17f31463f2d5ac69a7b534b1031837ed67bf92b12932d1117a6"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1564/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "25cf7c214d25fb61353b5176b9424b9a57f6fd850ae31275a5e3fa87696c8504"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1564/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "60115522a9181e33823fc1270b1f1d678a0eb9129435a95b71becadca472073e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
