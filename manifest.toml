#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1292~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1292/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "db242ca2328b12d57e35b9a1ba8048157235c9b294a51c43c95b3a619f567dd9"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1292/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "5e8f346eb39b3faf23e2907e8cd9e7492d21c13182455585fb9a376edc34aa39"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1292/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "031694bc99ffb015bc2e611b15539a75e13a6e5bf6afd86c187f8a33da3fb716"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
