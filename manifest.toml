#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2151~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2151/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "ade8a8bb23ef0eff19aeb0818bc4edc51b2e7741d92e8d919451ce046794dc32"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2151/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "bf3d5a3bc98f0fdc4e2c7256416701746659523fe3022551da874c1f61685920"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2151/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ce0dc0944b1a31243b897e1fe8e08d1355bc45d7e70529d42a9a1ff1af990ff3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
