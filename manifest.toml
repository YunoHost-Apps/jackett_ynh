#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1385~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1385/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "616f3a4d6023dad44ce538a49cbf56d6b9051fe8323f7192033fca0862cbd4ab"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1385/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "1a4aa798e7a01fe13774bb767769be9dd9081c917fd0e104f494b3d2197714f8"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1385/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "b8d416114b817a815c6d345aa91e29129a4fa5c875df9c2d5bbe19d87758a9e9"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
