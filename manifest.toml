#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1356~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1356/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "ece33413abcf144c966818b8efc2928133c6c82603bff1edd305c38d0b6db2f0"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1356/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "1e96de0e78f4c016e31ff05ab7efec5eebfb3b400846bccbddb9992f18c6801b"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1356/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "6a1bb308aed10bf3973f10559e1aec5d959583387c80903b22f7f82c77ba9540"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
