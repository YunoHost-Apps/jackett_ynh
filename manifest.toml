#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1947~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1947/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "dc819a1c6ac2d259a59863ca50487da0786949d0e1f360ca1f3c619ebf2c2b46"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1947/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "1eeb8dff899e7399b5b9a00168ca996219a5f202a807e9b3ad9afdaa01fc7a74"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1947/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "f8f8b1a838c1f6ce827eb8a4ed67001b011e00909847dfba2a8dd9c509fa8c94"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
