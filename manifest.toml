#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2007~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2007/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "b16d878144aff69bf696bddbe40c6fae9af7b2356a9f8c4a79af882ce39e23d7"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2007/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "175dfc68c28612c0469198503bef96e1b44c58c8f079166637b044ec2bbae80f"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2007/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "f79d1e0e9c773d725935a04f8223717d3a235a0ca6c870d69889664f67663154"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
