#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1316~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1316/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "585d6de1da37ab7fa47daad63fcfd446ab04d4f97e79108b5d88435d5516c309"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1316/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "0441a4d755249b7be59192ae2696b0d63b937feeb2d7c89e478e0da6e5f691fb"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1316/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a6356ee4844384fe1497fc438cea006bf94949cefc225d57f5b4e12b6c4fd8c4"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
