#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1554~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1554/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "d91e22fa7164c2da4730e55abeda945f2ba4ed2e3bd3b4807dd41022a5b66580"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1554/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ed6b34538be5aabf03d459a132ff2c3e5de4af6854cc41fe9af578aa1ef07afe"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1554/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "1aad057766c0a78d3c82d59156b0e3b36f9a5043389c91786f1637e382ca1c7f"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
