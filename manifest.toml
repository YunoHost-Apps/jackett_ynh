#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2092~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2092/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "9ad0c3561f9f1cce0b55df3bafb62ee03de1bdcf03a16035b9c448404e63c7f3"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2092/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "ce83cef54b9f2996e80e8228d26c3a65847c72cd4bc67cd1e2f39743ad634715"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2092/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "a255a5b239adab33dba709843dc3a4a43e0ba14422edd79a359ab5114f85a760"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
