#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2079~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2079/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "d14fa627af52096de796930ce8664fee1f6bbb1e6b22ac690ffce5e5ae5ff84e"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2079/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "337150970a8d20a4175b6c36a1f3cc22e94c8c822a7895cc80b00fadb3926f82"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2079/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "00677dbd5fdd1e5ad3bca47923b4735f4a1be2666e50ef683f97db426cba200b"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
