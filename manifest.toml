#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1849~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1849/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "60afd3a052e1b98d9121991e0a31c0575a06025fd013db5c0b1340ff8c307a0e"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1849/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "90efc01614a72473d8f129e47a44e44f989e0f180a8ca0712d28cd1350e674b6"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1849/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "06b24868377c49df36ea674a0fa9bd515ebea95305e1ac765a958985138a20fc"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
