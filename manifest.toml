#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1894~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1894/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "5b214637b30d25b72c7f408d6b51143f2ba7cedf28102e2a76d3a461112f438a"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1894/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "077e5615e9fdde65e1aa28026c4b7ec3284cc7cdcac5cd49cecb7be45be44dd8"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1894/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "7bb9e2335b31328179a7bd0ab0f4b7b7f6cfc868803a148be22c098063a17c92"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
