#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1539~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1539/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "57cdf76c99502352e4a94c1987f15ca745edf6810c88afa3d5dc9cca4b7ae3c4"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1539/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "bec443b4da7d36acd99b667299e5e01e95e881cd39e58bdb6c305139a699ae3a"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1539/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "d9cba19f7fbb17968f46145d1b86730a03da5b6c664037c365aeb1d51844300a"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
