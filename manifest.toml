#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1926~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1926/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "8ecc4616e89d6f04ba7f547ece9adf6398c9fe0cfb43a51d971ce225c137134f"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1926/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "3a7a48f7c148f06fd1e286289e24b7202a5f37674bb31bac5bd3094fa67f1ba5"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1926/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "90ab04b5bb1fded45320765e8a312be198e20a4be23957968c858cd322406e62"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
