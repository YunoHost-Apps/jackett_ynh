#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.2031~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2031/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "50267f64fd8d4fe2cf43a8477841f2be2f3a4b0a288a5d95b57ca8333a1c9ddf"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2031/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "8c54fd38299da671d7d29ac9a45ffcba16f68baeebb1e8d162485cef645d631d"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.2031/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ebb66a6c374bab53d8f66dbda1172910d8dbad7eacae0b14c2e9f4d97d59a019"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
