#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1287~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1287/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "22983a986ae9190cc18c226f1f3a68c01918170451eab4211229229d104f7ebd"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1287/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "600746a6d414a57875db53a823cca903e00c18ccbe481581dbabb4aa6567dc19"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1287/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "01694109d84774505ce4a81393e96932ef6f99e73183a40be2f11ee31ee6f9f7"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
