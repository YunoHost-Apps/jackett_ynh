#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1431~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1431/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "2af177ce6b2b59c18ac2a17757a4954b63fb6b672242bfc9c38ffd9a90d516a7"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1431/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "5d3a7140e5072ce8429db696271b01465ed5e5784419d9d51b1eb42faa1b83df"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1431/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "ef0649b8154bc390b2388a4050ac0f0b4337ea0cc4db3d8832d0204ebd58beb6"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
