#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "jackett"
name = "Jackett"
description.en = "API support for your favorite torrent trackers"
description.fr = "API pour vos trackers torrent préférés"

version = "0.24.1859~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-2.0"
code = "https://github.com/Jackett/Jackett"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/jackett"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1859/Jackett.Binaries.LinuxAMDx64.tar.gz"
    amd64.sha256 = "edbc7fb1f36d8d9c27e7e1bd41865c819e5dbe92f0c582197a770c8dcd9a9374"
    arm64.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1859/Jackett.Binaries.LinuxARM64.tar.gz"
    arm64.sha256 = "a2a6288042a6575696db579db152c69ebafe38ae0e69d00e4c8e9ca3a259407c"
    armhf.url = "https://github.com/Jackett/Jackett/releases/download/v0.24.1859/Jackett.Binaries.LinuxARM32.tar.gz"
    armhf.sha256 = "4259abf97e686dd32ecc14be327625a6d428af5b6c98393a72618991416b0ddf"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^Jackett.Binaries.LinuxAMDx64.tar.gz$"
    autoupdate.asset.arm64 = "^Jackett.Binaries.LinuxARM64.tar.gz$"
    autoupdate.asset.armhf = "^Jackett.Binaries.LinuxARM32.tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 9117
